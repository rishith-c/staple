services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: staple
      POSTGRES_PASSWORD: staple
      POSTGRES_DB: staple
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staple -d staple"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://staple:staple@db:5432/staple
      PORT: "3100"
      SERVE_UI: "true"
      STAPLE_DEPLOYMENT_MODE: "authenticated"
      STAPLE_DEPLOYMENT_EXPOSURE: "private"
      STAPLE_PUBLIC_URL: "${STAPLE_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - staple-data:/staple
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  staple-data:
